plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.wobbyhealth'
version = '0.7.10'

android {
  namespace "expo.modules.wobbyhealth"
  defaultConfig {
    versionCode 1
    versionName "0.7.10"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  // 👇 ADDED: Google Health Connect Client
  implementation("androidx.health.connect:connect-client:1.1.0-alpha07")
}